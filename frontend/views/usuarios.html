<div class="module-container">

  <div class="hero-card">
    <div>
      <h2>Usuarios del sistema</h2>
      <p>Administra accesos, roles y usuarios clínicos.</p>
    </div>

    <button class="btn-hero" onclick="abrirModalUsuario()">
      <i class="bi bi-plus-circle"></i>
      Nuevo usuario
    </button>
  </div>

  <div class="table-card">

    <div class="table-header">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input id="txtBuscarUsuario" placeholder="Buscar usuario...">
      </div>
    </div>

    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Profesional</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tbodyUsuarios"></tbody>
      </table>
    </div>

  </div>

</div>

<div class="modal fade" id="modalUsuario" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content modal-pro">

      <div class="modal-header modal-header-pro">
        <div>
          <span>SEGURIDAD</span>
          <h5 id="tituloModalUsuario" class="modal-title">Crear usuario</h5>
        </div>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal">
        </button>
      </div>

      <div class="modal-body p-4">
        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Usuario *</label>
            <input id="usrUsuario" class="form-control">
          </div>

          <div class="col-md-6" id="grupoClaveUsuario">
			  <label class="form-label">Contraseña inicial *</label>
			  <input id="usrClave" type="password" class="form-control">
		  </div>

          <div class="col-md-6">
            <label class="form-label">Nombre completo *</label>
            <input id="usrNombre" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Correo</label>
            <input id="usrCorreo" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Rol *</label>
            <select id="usrRol" class="form-control" onchange="controlarProfesionalUsuario()">
              <option value="">Seleccione...</option>
            </select>
          </div>

          <div class="col-md-6 d-none" id="grupoProfesionalUsuario">
            <label class="form-label">Profesional clínico *</label>
            <select id="usrProfesional" class="form-control">
              <option value="">Seleccione...</option>
            </select>
          </div>

        </div>
      </div>

      <div class="modal-footer-pro">
        <button class="btn-save" onclick="guardarUsuario()">
          <i class="bi bi-save"></i>
          Guardar usuario
        </button>
      </div>

    </div>
  </div>
</div>
