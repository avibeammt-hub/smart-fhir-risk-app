<section class="hero-mini">
  <div>
    <h2>Asignación profesionales FHIR</h2>
    <p>
      Relaciona profesionales con organizaciones, sedes y servicios clínicos mediante PractitionerRole.
    </p>
  </div>

  <button class="btn-main" onclick="abrirModalCrearVinculo()">
    <i class="bi bi-plus-circle"></i>
    Nuevo vínculo
  </button>
</section>

<section class="panel">

  <div class="table-header">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" id="txtBuscarVinculo" placeholder="Buscar vínculo profesional...">
    </div>
  </div>

  <div class="table-responsive">
    <table class="table align-middle">

      <thead>
		  <tr>
			<th>Profesional</th>
			<th>Organización</th>
			<th>Sede</th>
			<th>Servicio</th>
			<th>Cargo</th>
			<th>Código FHIR</th>
			<th>UUID FHIR</th>
			<th>Estado</th>
			<th width="140">Acciones</th>
		  </tr>
	  </thead>

      <tbody id="tbodyVinculos"></tbody>

    </table>
  </div>

</section>

<div class="modal fade" id="modalVinculo" tabindex="-1">

  <div class="modal-dialog modal-xl modal-dialog-centered">

    <div class="modal-content modal-pro">

      <div class="modal-header modal-header-pro">

        <div>
          <h5 id="tituloModalVinculo">
            Nuevo vínculo profesional
          </h5>

          <span>
            PractitionerRole FHIR
          </span>
        </div>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <div class="row g-4">

          <div class="col-md-6">
            <label class="form-label">Profesional</label>

            <select
              id="idProfesionalVinculo"
              class="form-control">
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Organización</label>

            <select
              id="idOrganizacionVinculo"
              class="form-control">
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Sede</label>

            <select
              id="idSedeVinculo"
              class="form-control">
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Servicio clínico</label>

            <select
              id="idServicioVinculo"
              class="form-control">
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Cargo</label>

            <input
              type="text"
              id="cargoVinculo"
              class="form-control"
              placeholder="Médico General">
          </div>

          <div class="col-md-6">
            <label class="form-label">Modalidad</label>

            <select
              id="modalidadVinculo"
              class="form-control">

              <option value="">Seleccione</option>
              <option value="PLANTA">PLANTA</option>
              <option value="PRESTACION_SERVICIOS">PRESTACIÓN SERVICIOS</option>
              <option value="TURNOS">TURNOS</option>

            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Fecha inicio</label>

            <input
              type="date"
              id="fechaInicioVinculo"
              class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Fecha fin</label>

            <input
              type="date"
              id="fechaFinVinculo"
              class="form-control">
          </div>

        </div>

      </div>

      <div class="modal-footer border-0">

        <button
          class="btn-secondary-pro"
          data-bs-dismiss="modal">

          Cancelar

        </button>

        <button
          class="btn-main"
          onclick="guardarVinculo()">

          <i class="bi bi-save"></i>

          Guardar y sincronizar

        </button>

      </div>

    </div>

  </div>

</div>
