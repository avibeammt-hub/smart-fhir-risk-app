<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FHIR Risk Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css/dashboard.css">
  <link rel="stylesheet" href="./assets/css/organizaciones.css">
</head>

<body>

<div class="app-shell">

  <aside class="sidebar">

    <div class="brand">
      <div class="brand-icon">
        <i class="bi bi-heart-pulse-fill"></i>
      </div>

      <div>
        <h5>FHIR Risk</h5>
        <span>Clinical Center</span>
      </div>
    </div>

    <nav class="menu">

      <a class="menu-item active" href="#" data-view="inicio">
        <i class="bi bi-grid-1x2-fill"></i>
        <span>Dashboard</span>
      </a>

      <a class="menu-item" href="#" data-view="organizaciones">
        <i class="bi bi-building"></i>
        <span>Organizaciones</span>
      </a>

      <a class="menu-item" href="#" data-view="sedes">
        <i class="bi bi-geo-alt-fill"></i>
        <span>Puntos atención</span>
      </a>
	  
	  <li class="menu-item" data-view="usuarios">
		<i class="bi bi-people"></i>
		<span>Usuarios</span>
	  </li>

      <a class="menu-item" href="#" data-view="servicios">
        <i class="bi bi-hospital-fill"></i>
        <span>Servicios clínicos</span>
      </a>
	    
	  <a class="menu-item" href="#" data-view="profesionales">
        <i class="bi bi-person-vcard-fill"></i>
        <span>Profesionales</span>
      </a>
	  
	  <a class="menu-item" href="#" data-view="vinculos">
	    <i class="bi bi-diagram-3-fill"></i>
	    <span>Asignación profesionales</span>
	  </a>

      <a class="menu-item" href="#" data-view="pacientes">
        <i class="bi bi-people-fill"></i>
        <span>Pacientes</span>
      </a>

      <a class="menu-item" href="#" data-view="valoracion">
        <i class="bi bi-clipboard2-pulse-fill"></i>
        <span>Valoración</span>
      </a>

      <a class="menu-item" href="#" data-view="fhir-viewer">
        <i class="bi bi-code-square"></i>
        <span>FHIR Viewer</span>
      </a>

    </nav>

    <button class="logout-btn" onclick="cerrarSesion()">
      <i class="bi bi-box-arrow-left"></i>
      <span>Cerrar sesión</span>
    </button>

  </aside>

  <main class="main-content">

    <header class="topbar">

      <div>
        <span class="eyebrow" id="moduloEtiqueta">Panel clínico interoperable</span>
        <h3 id="moduloTitulo">Dashboard de riesgo en salud</h3>
      </div>

      <div class="user-box">
        <div class="user-avatar">
          <i class="bi bi-person-fill"></i>
        </div>

        <div>
          <strong id="nombreUsuario">Usuario</strong>
          <small id="rolUsuario">Rol</small>
        </div>
      </div>

    </header>

    <div id="loaderGlobal" class="loader-global d-none">
      <div class="spinner"></div>
      <span>Cargando módulo...</span>
    </div>

    <section id="contenidoPrincipal" class="content-spa"></section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="./assets/js/usuarios.js"></script>
<script src="./assets/js/dashboard.js"></script>
<script src="./assets/js/organizaciones.js"></script>
<script src="./assets/js/sedes.js"></script>
<script src="./assets/js/servicios.js"></script>
<script src="./assets/js/profesionales.js"></script>
<script src="./assets/js/vinculos.js"></script>
<script src="./assets/js/pacientes.js"></script>
<script src="./assets/js/valoracion.js"></script>
<script src="./assets/js/fhir-viewer.js"></script>



</body>
</html>
